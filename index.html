<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Results Summary Component</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="card">

    <div class="result">
      <h3>Your Result</h3>

      <div class="circle">
        <h1>76</h1>
        <p>of 100</p>
      </div>

      <h2>Great</h2>

      <p class="description">
        You scored higher than 65% of the people who have taken these tests.
      </p>
    </div>

    <div class="summary">
      <h3>Summary</h3>

      <div class="item reaction">
        <div class="left">
          <span>⚡</span>
          <p>Reaction</p>
        </div>

        <p class="score">80 <span>/ 100</span></p>
      </div>

      <div class="item memory">
        <div class="left">
          <span>🧠</span>
          <p>Memory</p>
        </div>

        <p class="score">92 <span>/ 100</span></p>
      </div>

      <div class="item verbal">
        <div class="left">
          <span>💬</span>
          <p>Verbal</p>
        </div>

        <p class="score">61 <span>/ 100</span></p>
      </div>

      <div class="item visual">
        <div class="left">
          <span>👁️</span>
          <p>Visual</p>
        </div>

        <p class="score">72 <span>/ 100</span></p>
      </div>

      <button>Continue</button>
    </div>

  </div>

</body>
</html>
